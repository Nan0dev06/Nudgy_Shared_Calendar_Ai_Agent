# Render Blueprint — provisions the backend + a free Postgres in one step.
# In the Render dashboard: New -> Blueprint -> connect this repo -> Apply.
# See docs/deploy.md for the full walkthrough (env vars, Google redirect URI).
databases:
  - name: nudgy-db
    plan: free
    databaseName: nudgy
    user: nudgy

services:
  - type: web
    name: nudgy
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      # Injected automatically from the Postgres instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: nudgy-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Cerebras (free tier, no card): smart tool-calling on a big budget — much
      # better instruction-following than Groq's 8b, without the 70b's tiny
      # 100K/day cap that rate-limits mid-demo. OpenAI-compatible path.
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: NUDGY_MODEL
        value: gpt-oss-120b
      # Render generates a strong value once and keeps it stable.
      - key: SECRET_KEY
        generateValue: true
      # sync:false -> you paste these in the dashboard; never stored in git.
      # LLM_API_KEY = your Cerebras key (starts "csk-").
      - key: LLM_API_KEY
        sync: false
      # Kept for the Groq fallback (set LLM_PROVIDER=groq + NUDGY_MODEL to use).
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
