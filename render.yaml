# Render Blueprint — provisions the backend + a free Postgres in one step.
# In the Render dashboard: New -> Blueprint -> connect this repo -> Apply.
# See docs/deploy.md for the full walkthrough (env vars, Google redirect URI).
databases:
  - name: nudgy-db
    plan: free
    databaseName: nudgy
    user: nudgy

services:
  - type: web
    name: nudgy
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      # Injected automatically from the Postgres instance above.
      - key: DATABASE_URL
        fromDatabase:
          name: nudgy-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: LLM_PROVIDER
        value: groq
      # Groq's free limits are per-model. llama-3.1-8b-instant (500K tokens/day,
      # higher per-minute) is the reliable choice for a live demo — the 70b
      # (llama-3.3-70b-versatile, only 100K/day) runs out of tokens after a
      # handful of turns. 70b is smarter at tools; swap back if budget allows.
      # For the smart model WITHOUT the tiny budget, point LLM_BASE_URL at
      # Cerebras (free, no card): https://api.cerebras.ai/v1 + a CEREBRAS key.
      - key: NUDGY_MODEL
        value: llama-3.1-8b-instant
      # Render generates a strong value once and keeps it stable.
      - key: SECRET_KEY
        generateValue: true
      # sync:false -> you paste these in the dashboard; never stored in git.
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
